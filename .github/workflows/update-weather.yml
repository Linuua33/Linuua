name: Update CWB weather data

on:
  push:
    branches: [ "master" ]
  schedule:
    - cron: "0 */3 * * *" # 每 3 小時自動半夜爬起來幫你抓天氣、自動更新網頁
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # 🛠️ 步驟 1：只執行預建置（抓取氣象資料並存成 JSON，注入金鑰確保抓取成功）
      - name: Fetch Latest Weather Data
        env:
          CWB_API_KEY: ${{ secrets.CWB_API_KEY }}
          VITE_CWB_API_KEY: ${{ secrets.CWB_API_KEY }}
        run: |
          cd artifacts/wowo-app
          pnpm run prebuild

      # 🛠️ 步驟 2：正式打包前端網頁（把金鑰灌進環境變數，讓手機瀏覽器也能現場連線）
      - name: Build Frontend Application
        env:
          VITE_CWB_API_KEY: ${{ secrets.CWB_API_KEY }}
          VITE_CWA_API_KEY: ${{ secrets.CWB_API_KEY }}
        run: |
          cd artifacts/wowo-app
          pnpm run build

      # 🚀 步驟 3：將帶有全新天氣與金鑰的 dist 資料夾自動推送到 gh-pages 分支
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./artifacts/wowo-app/dist
          publish_branch: gh-pages
