name: Update CWB weather data

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Fetch latest weather data
        working-directory: artifacts/wowo-app
        run: pnpm run fetch-weather
        env:
          CWB_API_KEY: ${{ secrets.CWB_API_KEY }}

      - name: Build site
        working-directory: artifacts/wowo-app
        run: pnpm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: artifacts/wowo-app/dist
          publish_branch: gh-pages
