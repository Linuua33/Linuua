name: Update CWB weather data

on:
  push:
    branches: [ "master" ]
  schedule:
    - cron: "0 */3 * * *" # 🔥 加碼：每 3 小時自動半夜爬起來幫你抓天氣、自動更新網頁
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # 1. 叫機器人去抓最新的即時天氣資料
      - name: Run weather updater
        env:
          CWB_API_KEY: ${{ secrets.CWB_API_KEY }}
        run: |
          cd artifacts/wowo-app
          pnpm run fetch-weather

      # 2. 關鍵補漏：抓完天氣後，叫機器人在雲端直接幫你把前端網頁重新 Build 打包！
      - name: Build Frontend Application
        run: |
          cd artifacts/wowo-app
          pnpm run build

      # 3. 終極全自動：直接把剛剛打包好、熱騰騰帶有新天氣的 dist 資料夾，自動推送到 gh-pages 分支！
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./artifacts/wowo-app/dist
          publish_branch: gh-pages
