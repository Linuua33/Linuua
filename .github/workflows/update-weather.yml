name: Update CWB weather data

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest
    
    # 🔥 關鍵修正 1：在這裡直接塞給這個任務「最高寫入權限」！
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 🔥 關鍵修正 2：讓 checkout 工具帶上自動生成的安全通行證
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run weather updater
        env:
          CWB_API_KEY: ${{ secrets.CWB_API_KEY }}
        run: |
          cd artifacts/wowo-app
          pnpm run fetch-weather

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff-index --quiet HEAD || git commit -m "chore: update cwb weather data [skip ci]"
          git push origin HEAD:master
